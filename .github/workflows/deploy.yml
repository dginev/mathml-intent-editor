name: Deploy to GitHub Pages

# Gated on CI: deploys fire only after the CI workflow (build · lint · unit + e2e) completes
# SUCCESSFULLY on main — a red push can no longer ride into production. workflow_dispatch remains
# as the manual escape hatch (deploys current main, ungated).
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Allow the Pages deploy; one in-flight deploy at a time.
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Run for a manual dispatch, or when the triggering CI run succeeded (skipped on CI failure).
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      BASE_PATH: /mathml-intent-open-editor/ # project site served under /<repo>/; .env.production has the VITE_GH_*
    steps:
      - uses: actions/checkout@v4
        with:
          # Deploy exactly the commit CI validated (empty on workflow_dispatch → current main).
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
